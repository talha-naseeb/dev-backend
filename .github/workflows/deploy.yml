name: Deploy — Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        # Requires RAILWAY_TOKEN secret in repo settings
        # Get token from: railway.app → Account Settings → Tokens
        run: |
          npm install -g @railway/cli
          railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
